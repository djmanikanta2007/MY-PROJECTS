<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Enhanced Gradient Background */
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Floating decorative elements */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(80px);
            z-index: -2;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -150px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            width: 300px;
            height: 300px;
            bottom: -100px;
            right: -100px;
            background: linear-gradient(45deg, #a1c4fd, #c2e9fb);
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .glass-card-header {
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 20px 20px 0 0;
            position: relative;
            text-align: center;
        }

        .glass-card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
        }

        .glass-card-body {
            padding: 2rem;
        }

        /* Enhanced Typography */
        .glass-card h3 {
            color: white;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
            position: relative;
            display: inline-block;
        }

        .glass-card h3::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
            border-radius: 2px;
        }

        /* Form Enhancements */
        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-control:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(54, 162, 235, 0.25);
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: #666;
            opacity: 0.7;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group .form-control {
            padding-left: 2.5rem;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 1.2rem;
            pointer-events: none;
            transition: 0.3s;
        }

        .form-control:focus + i,
        .form-control:not(:placeholder-shown) + i {
            color: #4cc9f0;
            transform: translateY(-50%) scale(1.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4cc9f0, #43e97b);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 1rem;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px 0 rgba(76, 201, 240, 0.4);
            background: linear-gradient(135deg, #43e97b, #4cc9f0);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        /* Icon enhancements */
        .btn-primary i {
            transition: transform 0.3s ease;
        }

        .btn-primary:hover i {
            transform: scale(1.2) rotate(10deg);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem;
                margin: 1rem;
            }

            .glass-card-header,
            .glass-card-body {
                padding: 1.5rem;
            }

            .glass-card h3 {
                font-size: 1.5rem;
            }
        }

        /* Animation for elements */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* Staggered animations for form elements */
        .form-control {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .form-control:nth-child(2) {
            animation-delay: 0.1s;
        }

        .btn-primary {
            animation-delay: 0.2s;
        }

        /* Floating button for demo account info */
        .demo-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: white;
            z-index: 1000;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.7;
            }
        }

        .demo-info:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- Demo Info Badge -->
    <div class="demo-info">
        <i class="fas fa-info-circle me-2"></i>Demo: admin / 1234
    </div>

    <div class="glass-card">
        <div class="glass-card-header">
            <h3><i class="fas fa-user-shield me-3"></i>Admin Login</h3>
        </div>
        <div class="glass-card-body">
            <form action="/login" method="post">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" name="username" placeholder="Username" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-group mb-4">
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                </button>
            </form>
        </div>
    </div>
</body>
</html>
