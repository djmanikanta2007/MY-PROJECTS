<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Result System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Enhanced Gradient Background */
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 2rem;
        }

        /* Floating decorative elements */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(80px);
            z-index: -2;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -150px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            width: 300px;
            height: 300px;
            bottom: -100px;
            right: -100px;
            background: linear-gradient(45deg, #a1c4fd, #c2e9fb);
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .glass-card-header {
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
        }

        .glass-card-body {
            padding: 1.5rem;
        }

        h2, h4, h5 {
            color: white;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
            margin-bottom: 0;
        }

        /* Form Enhancements */
        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(54, 162, 235, 0.25);
        }

        .btn-custom {
            background: linear-gradient(135deg, #4cc9f0, #43e97b);
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            color: #111;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px 0 rgba(76, 201, 240, 0.4);
            color: #111;
        }

        /* Table */
        .table {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 0;
        }

        .table thead th {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 1rem;
        }

        .table td {
            vertical-align: middle;
            padding: 1rem;
        }

        /* Grade Badges */
        .grade-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }
        .grade-A { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .grade-B { background: linear-gradient(135deg, #fbc2eb, #a6c1ee); color: #333; }
        .grade-C { background: linear-gradient(135deg, #fd79a8, #f8b500); }
        .grade-F { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }

        .btn-delete {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: none;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-delete:hover {
            background: #ff6b6b;
            color: white;
        }

        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-2"></i>Admin Dashboard</a>
            <a href="index.html" class="btn btn-outline-light btn-sm"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
        </div>
    </nav>

    <div class="container">
        
        <div class="row">
            <!-- Add Student Form -->
            <div class="col-lg-4">
                <div class="glass-card">
                    <div class="glass-card-header">
                        <h5><i class="fas fa-user-plus me-2"></i>Add Record</h5>
                    </div>
                    <div class="glass-card-body">
                        <form id="addStudentForm">
                            <div class="mb-3">
                                <input type="text" class="form-control" name="name" placeholder="Full Name" required>
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" name="roll" placeholder="Roll Number" required>
                            </div>
                            
                            <div id="subjectsContainer">
                                <div class="mb-3">
                                    <input type="number" class="form-control" name="subject[]" placeholder="Subject Score" min="0" max="100" required>
                                </div>
                            </div>
                            
                            <div class="mb-4 text-end">
                                <button type="button" class="btn btn-sm btn-outline-light" style="color: #333; border-color: rgba(0,0,0,0.1);" onclick="addSubject()">
                                    <i class="fas fa-plus me-1"></i>Add Subject
                                </button>
                            </div>
                            
                            <button type="submit" class="btn btn-custom w-100">Calculate & Save</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Dashboard Data -->
            <div class="col-lg-8">
                
                <!-- Table -->
                <div class="glass-card mb-4">
                    <div class="glass-card-header d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-table me-2"></i>Student Results Database</h5>
                        <span class="badge bg-light text-dark" id="studentCount">0 Students</span>
                    </div>
                    <div class="glass-card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover text-center">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Roll No</th>
                                        <th>Total Score</th>
                                        <th>Percentage</th>
                                        <th>Grade</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Graph -->
                <div class="glass-card">
                    <div class="glass-card-header">
                        <h5><i class="fas fa-chart-bar me-2"></i>Performance Overview</h5>
                    </div>
                    <div class="glass-card-body" style="background: rgba(255,255,255,0.85); border-radius: 0 0 20px 20px;">
                        <canvas id="performanceChart" height="100"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
    <script>
        // Initialize local storage array
        let students = JSON.parse(localStorage.getItem('studentResults')) || [];

        // Add dummy data if empty for demo purposes
        if (students.length === 0) {
            students = [
                { name: "Rahul Sharma", roll: "CS001", total: 275, percentage: 91.6, grade: "A" },
                { name: "Priya Patel", roll: "CS002", total: 230, percentage: 76.6, grade: "B" },
                { name: "Amit Kumar", roll: "CS003", total: 195, percentage: 65.0, grade: "C" }
            ];
            saveData();
        }

        let myChart = null;

        function saveData() {
            localStorage.setItem('studentResults', JSON.stringify(students));
        }

        // Dynamic subject addition
        function addSubject() {
            const container = document.getElementById('subjectsContainer');
            const div = document.createElement('div');
            div.className = 'mb-3 d-flex align-items-center gap-2';
            div.innerHTML = `
                <input type="number" class="form-control" name="subject[]" placeholder="Subject Score" min="0" max="100" required>
                <button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()" style="border-radius: 8px;"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(div);
        }

        function loadStudents() {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('studentCount').innerText = `${students.length} Students`;
            tbody.innerHTML = '';

            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No student records found. Add one on the left!</td></tr>`;
            } else {
                students.forEach((s, index) => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold">${s.name}</td>
                            <td class="text-muted">${s.roll}</td>
                            <td>${s.total}</td>
                            <td class="fw-bold">${s.percentage.toFixed(1)}%</td>
                            <td><span class="grade-badge grade-${s.grade}">${s.grade}</span></td>
                            <td>
                                <button class="btn-delete" onclick="deleteStudent(${index})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            updateChart();
        }

        document.getElementById('addStudentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.querySelector('input[name="name"]').value;
            const roll = document.querySelector('input[name="roll"]').value;
            
            // Collect all dynamic subjects
            const subjectInputs = document.querySelectorAll('input[name="subject[]"]');
            let total = 0;
            let count = 0;
            
            subjectInputs.forEach(input => {
                if (input.value) {
                    total += parseInt(input.value);
                    count++;
                }
            });

            if (count === 0) return alert("Please add at least one subject.");

            const percentage = total / count;
            let grade = 'F';
            if (percentage >= 90) grade = 'A';
            else if (percentage >= 75) grade = 'B';
            else if (percentage >= 60) grade = 'C';

            // Check duplicate roll
            if (students.some(s => s.roll === roll)) {
                alert("Error: Roll number already exists!");
                return;
            }

            students.push({ name, roll, total, percentage, grade });
            saveData();
            loadStudents();
            this.reset();
        });

        function deleteStudent(index) {
            if (confirm("Delete this record?")) {
                students.splice(index, 1);
                saveData();
                loadStudents();
            }
        }

        function updateChart() {
            const studentNames = students.map(s => s.name);
            const studentMarks = students.map(s => s.percentage);

            const ctx = document.getElementById('performanceChart').getContext('2d');
            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#6a11cb');   
            gradient.addColorStop(1, '#2575fc');

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: studentNames,
                    datasets: [{
                        label: 'Overall Percentage',
                        data: studentMarks,
                        backgroundColor: gradient,
                        borderRadius: 6,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // Initialize on load
        loadStudents();
    </script>
</body>
</html>
