<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Tech Innovators Summit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #0a0a0a;
            --bg-card: #141414;
            --accent-primary: #00f0ff;
            --accent-danger: #ff3366;
            --text-primary: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255,255,255,0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Sidebar/Header */
        .admin-header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.25rem;
        }

        .brand-logo span { color: var(--accent-primary); }

        .dashboard-container {
            padding: 3rem 0;
        }

        /* Stats Cards */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.status { background: rgba(0, 255, 128, 0.1); color: #00ff80; }
        .stat-icon.events { background: rgba(112, 0, 255, 0.1); color: #7000ff; }

        .stat-details h3 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-details p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Actions Bar */
        .actions-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-control {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .form-control:focus {
            background-color: rgba(255,255,255,0.08);
            border-color: var(--accent-primary);
            box-shadow: none;
            color: var(--text-primary);
        }

        .btn-custom {
            padding: 0.5rem 1.5rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .btn-primary-custom {
            background: var(--text-primary);
            color: var(--bg-dark);
            border: none;
        }

        .btn-primary-custom:hover {
            background: var(--accent-primary);
        }

        /* Table */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .table {
            margin: 0;
            color: var(--text-primary);
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-primary);
        }

        .table thead th {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }

        .table tbody td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            vertical-align: middle;
            font-size: 0.9rem;
        }

        .table tbody tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .btn-delete {
            background: rgba(255, 51, 102, 0.1);
            color: var(--accent-danger);
            border: 1px solid rgba(255, 51, 102, 0.2);
            width: 32px; height: 32px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background: var(--accent-danger);
            color: white;
        }

        .badge-pass {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-primary);
            padding: 0.35rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .empty-state {
            padding: 4rem 0;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="brand-logo">TIS<span>_Admin</span></a>
            <a href="index.html" class="btn btn-outline-light btn-sm" style="font-size: 0.8rem;"><i class="fas fa-sign-out-alt me-2"></i>Exit</a>
        </div>
    </header>

    <div class="container dashboard-container">
        
        <!-- Top Stats -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-details">
                        <p>Total Attendees</p>
                        <h3 id="totalCount">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon events"><i class="fas fa-ticket-alt"></i></div>
                    <div class="stat-details">
                        <p>Pass Types</p>
                        <h3>4</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon status"><i class="fas fa-server"></i></div>
                    <div class="stat-details">
                        <p>System Status</p>
                        <h3 style="color: #00ff80;">100%</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions-panel">
            <div class="row align-items-center g-3">
                <div class="col-md-8">
                    <form id="searchForm" class="d-flex gap-2">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-search"></i></span>
                            <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search attendees by name...">
                        </div>
                    </form>
                </div>
                <div class="col-md-4 text-md-end">
                    <button id="exportBtn" class="btn btn-custom btn-primary-custom w-100 w-md-auto">
                        <i class="fas fa-download me-2"></i>Export CSV
                    </button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>Pass Tier</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
                
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <h5>No Records Found</h5>
                    <p>There are no attendees matching the current criteria.</p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check Auth
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'index.html';
        }

        // Dummy Data Fallback
        const dummyData = [
            { id: "1", name: "Rahul Sharma", email: "rahul@company.in", phone: "+91 98765 43210", event: "Developer Pass (Hackathon + Keynotes)" },
            { id: "2", name: "Priya Patel", email: "priya.p@startup.com", phone: "+91 87654 32109", event: "Founder Pass (VIP Networking)" },
            { id: "3", name: "Amit Kumar", email: "amit.tech@gmail.com", phone: "+91 76543 21098", event: "Virtual Access Pass (Online Only)" }
        ];

        let participants = JSON.parse(localStorage.getItem('participants'));
        if (!participants || participants.length === 0) {
            participants = dummyData;
            localStorage.setItem('participants', JSON.stringify(participants));
        }

        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const totalCount = document.getElementById('totalCount');
        const searchInput = document.getElementById('searchInput');

        function renderTable(data) {
            tableBody.innerHTML = '';
            totalCount.innerText = data.length;
            
            if (data.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                data.forEach((p, index) => {
                    tableBody.innerHTML += `
                        <tr>
                            <td class="text-muted font-monospace">#${index + 1}</td>
                            <td class="fw-medium">${p.name}</td>
                            <td>
                                <div>${p.email}</div>
                                <div class="text-muted" style="font-size: 0.8rem;">${p.phone}</div>
                            </td>
                            <td><span class="badge-pass">${p.event}</span></td>
                            <td class="text-end">
                                <button class="btn-delete" onclick="deleteParticipant('${p.id}')" title="Delete Record">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        window.deleteParticipant = function(id) {
            if (confirm('Revoke this pass? This cannot be undone.')) {
                participants = participants.filter(p => p.id !== id);
                localStorage.setItem('participants', JSON.stringify(participants));
                renderTable(participants);
            }
        };

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = participants.filter(p => p.name.toLowerCase().includes(term));
            renderTable(filtered);
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            let csv = 'ID,Name,Email,Phone,Pass Type\n';
            participants.forEach(p => {
                csv += `${p.id},${p.name},${p.email},${p.phone},${p.event}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'attendees.csv';
            a.click();
        });

        // Add logout listener to Exit button
        document.querySelector('.btn-outline-light').addEventListener('click', () => {
            localStorage.removeItem('adminLoggedIn');
        });

        // Initial render
        renderTable(participants);
    </script>
</body>
</html>
