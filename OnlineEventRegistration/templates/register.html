<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="mb-4">Event Registration</h3>

<form action="/submit" method="post">

<input class="form-control mb-3" name="name" placeholder="Full Name" required>

<input class="form-control mb-3" name="email" placeholder="Email" required>

<input class="form-control mb-3" name="phone" placeholder="Phone Number" required>

<select class="form-control mb-3" name="event">

<option>Hackathon</option>
<option>Workshop</option>
<option>Tech Seminar</option>
<option>Coding Contest</option>

</select>

<button type="submit" class="btn btn-success">Register</button>

</form>

</div>

</div>

</body>
</html>
